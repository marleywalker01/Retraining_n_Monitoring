name: Auto Retrain and Monitor

on:
  push:
    paths:
      - '.github/workflows/retrain-on-push.yaml'
      - 'data/*.csv'      # New data uploaded
      - 'train/*.csv'     # Training data changed
      - 'test/*.csv'      # Test data changed
  schedule:
    - cron: '0 */12 * * *'  # Run every 12 hours
  workflow_dispatch:        # Manual trigger

jobs:
  monitor-and-retrain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install dvc pandas numpy tensorflow scikit-learn joblib scipy matplotlib
    
    - name: Configure DVC remote
      run: |
        dvc remote modify origin --local auth basic
        dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
        dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
    
    - name: Pull latest data and models
      run: dvc pull --allow-missing || echo "No existing data to pull"
    
    - name: Check for new data and preprocess
      run: |
        if [ -f "data/new_data.csv" ]; then
          echo " New data detected, preprocessing..."
          python src/preprocess_new_data.py
          echo "NEW_DATA=true" >> $GITHUB_ENV
        else
          echo " No new data found"
          echo "NEW_DATA=false" >> $GITHUB_ENV
        fi
    
    - name: Run comprehensive monitoring
      id: monitoring
      run: |
        python src/monitor.py
        if [ -f "retrain_needed.txt" ]; then
          RETRAIN=$(cat retrain_needed.txt)
          echo "retrain_needed=$RETRAIN" >> $GITHUB_OUTPUT
          echo "RETRAIN_NEEDED=$RETRAIN" >> $GITHUB_ENV
        else
          echo "retrain_needed=false" >> $GITHUB_OUTPUT
          echo "RETRAIN_NEEDED=false" >> $GITHUB_ENV
        fi
      continue-on-error: false
    
    - name: Retrain model
      if: env.RETRAIN_NEEDED == 'true' || env.NEW_DATA == 'true'
      run: |
        echo " RETRAINING MODEL..."
        echo "Reason: NEW_DATA=${{ env.NEW_DATA }}, RETRAIN_NEEDED=${{ env.RETRAIN_NEEDED }}"
        
        # Force retrain to ensure new data is included
        dvc repro --force
        
        # Save training timestamp
        echo "$(date)" > artifacts/metadata/last_retrain.txt
        git rev-parse HEAD > artifacts/metadata/model_version.txt
        
        # Save training metrics summary
        echo "{
          \"last_retrain\": \"$(date -Iseconds)\",
          \"git_commit\": \"$(git rev-parse HEAD)\",
          \"retrain_reason\": \"NEW_DATA=${{ env.NEW_DATA }}, DRIFT_DETECTED=${{ env.RETRAIN_NEEDED }}\"
        }" > artifacts/metadata/retrain_info.json
        
        # Push new model and artifacts to DVC
        dvc push
        
      continue-on-error: false
    
    - name: Commit and push changes
      if: env.RETRAIN_NEEDED == 'true' || env.NEW_DATA == 'true'
      run: |
        # Configure git
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Add all changes
        git add artifacts/ models/ train/ test/ data/ || true
        git add *.dvc dvc.lock || true
        
        # Commit if there are changes
        if git diff --staged --quiet; then
          echo " No changes to commit"
        else
          git commit -m "Auto-retrain: Model updated with new data ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        fi
    
    - name: Upload monitoring reports
      uses: actions/upload-artifact@v4
      with:
        name: monitoring-reports-${{ github.run_id }}
        path: |
          reports/
          monitoring/
          artifacts/metrics/
          artifacts/metadata/
          model_results.png
        retention-days: 7
    
    - name: Send success notification
      if: success() && (env.RETRAIN_NEEDED == 'true' || env.NEW_DATA == 'true')
      run: |
        echo " Auto-retraining completed successfully!"
        echo "Model retrained and pushed to DVC remote"
        # Uncomment for Slack notification
        # curl -X POST -H 'Content-type: application/json' \
        # --data '{"text":" Model auto-retrained successfully with new data"}' \
        # ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Send failure notification
      if: failure()
      run: |
        echo " Auto-retraining failed!"
        echo "Check the workflow logs for details"
        # Uncomment for Slack notification
        # curl -X POST -H 'Content-type: application/json' \
        # --data '{"text":" Auto-retraining failed! Check GitHub Actions logs"}' \
        # ${{ secrets.SLACK_WEBHOOK_URL }}
