stages:
  train:
    cmd: python src/model.py # train the model and save outputs
    deps: # dependencies for this stage
    - src/model.py
    - params.yaml
    - train/train.csv
    - test/test.csv
    outs: # outputs of this stage (saved to DVC cache and remote)
    - models/model.keras
    - artifacts/X_test_cnn.npy
    - artifacts/y_test.npy
    - artifacts/training_history.json
    - artifacts/feature_columns.json     
    - dvclive/params.yaml:
        cache: false # don't store params.yaml in DVC cache since it's small and we want to overwrite it each time

  evaluate: # evaluate the model on test set and save metrics/plots
    cmd: python src/evaluate.py # evaluate the model and save metrics/plots
    deps: # dependencies for this stage
    - src/evaluate.py
    - models/model.keras
    - artifacts/X_test_cnn.npy
    - artifacts/y_test.npy
    - artifacts/training_history.json
    - artifacts/feature_columns.json     
    - test/test.csv
    - params.yaml
    metrics: # metrics to save and track with DVC
    - dvclive/metrics.json
    - metrics.json:
        cache: false # don't store metrics.json in DVC cache since it's small and we want to overwrite it each time
params: # parameters that affect the pipeline (used for tracking and reproducibility)
- dvclive/params.yaml 
metrics: # metrics to track and compare across runs
- dvclive/metrics.json
plots: # plots to track and compare across runs
- dvclive/plots/metrics:
    x: step
