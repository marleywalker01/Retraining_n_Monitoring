name: Auto Retrain on New Data

on:
  push:
    paths:
      - '.github/workflows/retrain-on-push.yaml'
      - 'data/*.csv'
      - 'train/*.csv'
      - 'test/*.csv'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  monitor-and-retrain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Configure Git user for DVCLive
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install dvc pandas numpy tensorflow scikit-learn joblib scipy matplotlib dvclive
    
    - name: Configure DVC remote
      run: |
        dvc remote modify origin --local auth basic
        dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
        dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
    
    - name: Pull latest data and models
      run: dvc pull --allow-missing || echo "No existing data to pull"
    
    - name: Check for new data
      id: check_data
      run: |
        if [ -f "data/new_data.csv" ]; then
          echo "New data detected"
          echo "NEW_DATA=true" >> $GITHUB_ENV
          echo "new_data=true" >> $GITHUB_OUTPUT
        else
          echo "No new data found"
          echo "NEW_DATA=false" >> $GITHUB_ENV
          echo "new_data=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Preprocess new data
      if: env.NEW_DATA == 'true'
      run: |
        echo "Preprocessing new data..."
        python src/preprocess_new_data.py

    - name: Run monitoring (for logging only)
      run: |
        echo "Running monitoring to check current state..."
        python src/monitor.py || echo "Monitoring completed with warnings"
    
    - name: Retrain model (only if new data exists)
      if: env.NEW_DATA == 'true'
      run: |
        echo "=========================================="
        echo "RETRAINING MODEL (New Data Detected)"
        echo "=========================================="
        
        # Combine old and new data
        python -c "
        import pandas as pd
        import os
        import shutil
        from datetime import datetime

        # Load existing training data
        if os.path.exists('train/train.csv'):
            train_df = pd.read_csv('train/train.csv')
            print(f'Original training data: {len(train_df)} rows')
            
            # Load new data
            new_df = pd.read_csv('data/new_data.csv')
            print(f'New data: {len(new_df)} rows')
            
            # Combine
            combined_df = pd.concat([train_df, new_df], ignore_index=True)
            combined_df = combined_df.dropna()
            print(f'Combined data: {len(combined_df)} rows')
            
            # Save combined data
            combined_df.to_csv('train/train.csv', index=False)
            print('Combined data saved to train/train.csv')
            
            # Move new data to processed folder
            os.makedirs('data/processed', exist_ok=True)
            timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
            shutil.move('data/new_data.csv', f'data/processed/new_data_{timestamp}.csv')
            print(f'New data moved to data/processed/new_data_{timestamp}.csv')
        "
        
        # Retrain the model via DVC pipeline
        echo ""
        echo "Starting model retraining..."
        dvc repro train
        
        # Save retraining metadata
        mkdir -p artifacts/metadata
        echo "$(date)" > artifacts/metadata/last_retrain.txt
        
        echo ""
        echo "Retraining completed!"
    
    - name: Evaluate new model
      if: env.NEW_DATA == 'true'
      run: |
        echo "Evaluating new model..."
        python src/evaluate.py
    
    - name: Push new model and artifacts
      if: env.NEW_DATA == 'true'
      run: |
        dvc push
    
    - name: Commit and push changes
      if: env.NEW_DATA == 'true'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add artifacts/ models/ train/ data/processed/ || true
        git add *.dvc dvc.lock || true
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-retrain: Model updated with new data ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        fi
    
    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: retraining-reports-${{ github.run_id }}
        path: |
          reports/
          artifacts/metrics/
          artifacts/metadata/
          model_results.png
          model_summary.txt
        retention-days: 7
    
    - name: Send notification
      if: env.NEW_DATA == 'true'
      run: |
        echo "=========================================="
        echo "AUTO-RETRAINING COMPLETED"
        echo "=========================================="
        echo "Model retrained with new data"
        echo "New model pushed to DVC and Git"