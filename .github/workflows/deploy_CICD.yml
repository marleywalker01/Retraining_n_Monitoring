# .github/workflows/train.yml
name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '100'

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for dvc metrics diff

      # ── 2. Python setup ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip ──────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Configure DVC remote credentials ──────────────────
      - name: Configure DVC remote
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
          # GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          # OR for S3:
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # dvc remote modify myremote gdrive_use_service_account true
          # Adjust this block to match whichever remote you chose in Step 4
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}

      # ── 6. Pull data from DVC remote ─────────────────────────
      - name: Pull data with DVC
        run: dvc pull

      # ── 7. Override params from workflow_dispatch input ───────
      - name: Override epochs if provided
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'EOF'
          import yaml, sys
          with open("params.yaml") as f:
              p = yaml.safe_load(f)
          p["model"]["epochs"] = int("${{ github.event.inputs.epochs }}")
          with open("params.yaml", "w") as f:
              yaml.dump(p, f)
          print(f"Epochs set to {p['model']['epochs']}")
          EOF

      # ── 8. Reproduce DVC pipeline ────────────────────────────
      # dvc repro only re-runs stages whose deps/params changed.
      - name: Run DVC pipeline
        run: dvc repro

      # ── 9. Show and compare metrics ──────────────────────────
      - name: Show metrics
        run: |
          dvc metrics show
          dvc metrics diff HEAD~1 || echo "No previous run to compare against"

      # ── 10. Push updated artifacts to DVC remote ─────────────
      - name: Push artifacts to DVC remote
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
        run: dvc push

      # ── 11. Commit dvc.lock back to repo ─────────────────────
      # dvc.lock records exactly what was run and with what data.
      - name: Commit dvc.lock
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock metrics.json dvclive/
          git diff --staged --quiet || git commit -m "update dvc.lock and metrics [skip ci]"
          git push

      # ── 12. Upload artifacts for download from Actions UI ─────
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.keras
          retention-days: 30

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            model_results.png
            metrics.json
            dvclive/report.html
          retention-days: 30

      # ── 13. Post metrics as PR comment ────────────────────────
      - name: Post PR comment with metrics diff
        if: github.event_name == 'pull_request'
        run: |
          METRICS=$(dvc metrics diff --md || echo "No metrics diff available")
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Metrics comparison
            ${METRICS}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}